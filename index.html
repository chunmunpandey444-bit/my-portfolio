<!DOCTYPE html>
<html>
<head>
    <title>Mera Simple Card</title>

        body {
            background-color: lightgrey;

        /* Hamara Card Dabba */
        .my-card {
            background-color: white;

    <!-- Ye hamari card ka dabba shuru hua -->

        </a>

    <!-- Card ka dabba band -->

</html>
