<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript DOM & Input Practice</title>
</head>
<body>

    <!-- Section 1: Counter App -->
    <h1>My Counter App</h1>
    <h2 id="counter-value">0</h2>
    <button id="increment-btn">Increase (+)</button>
    <button id="decrement-btn">Decrease (-)</button>
    <button id="reset-btn">Reset</button>

    <hr>

    <!-- Section 2: Input Greeting App -->
    <h1 id="greeting-msg">Enter your name below:</h1>
    <input type="text" id="user-name" placeholder="Type name here...">
    <button id="submit-btn">Greet Me</button>

    <script src="script.js"></script>
</body>
</html>
