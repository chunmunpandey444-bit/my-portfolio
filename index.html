<!DOCTYPE html>
<html>
<head>
    <title>Mera Simple Card</title>
    <style>
        body {
            background-color: lightgrey;
        }
        
        /* Hamara Card Dabba */
        .my-card {
            background-color: white;  
            width: 280px;             
            padding: 20px;              
            margin: 30px auto;         
            border-radius: 15px;       
            text-align: center;        
        }

        .my-button {
            background-color: blue;
            color: white;
            padding: 8px 15px;
            text-decoration: none;      
            border-radius: 5px;         
            display: inline-block;
        }
    </style>
</head>
<body>

    <!-- Ye hamari card ka dabba shuru hua -->
    <div class="my-card">
        <h2>Pushpraj Pandey</h2>
        <p>..........</p>.</p>
        <a href="#" class="my-button">Profile Dekhein</a>
    </div>
    <!-- Card ka dabba band -->

</body>
</html>
